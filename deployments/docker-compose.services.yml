name: go-commerce-services

services:
  order-service:
    image: order-service:local
    environment:
      APP_ENV: production

      DB_HOST: postgres
      DB_PASSWORD: ${ORDER_DB_PASSWORD}

      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "6005:6005"
    networks:
      - ecommerce-network
    restart: unless-stopped

  catalog-write-service:
    image: catalog-write-service:local
    environment:
      APP_ENV: production
      DB_HOST: postgres
      DB_PASSWORD: ${CATALOG_WRITE_DB_PASSWORD}
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "6002:6002"
    networks:
      - ecommerce-network
    restart: unless-stopped

  inventory-service:
    image: inventory-service:local
    environment:
      APP_ENV: production
      DB_HOST: postgres
      DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      RABBITMQ_URL: ${RABBITMQ_URL}
    networks:
      - ecommerce-network
    restart: unless-stopped

  catalog-read-service:
    image: catalog-read-service:local
    environment:
      APP_ENV: production
      MONGO_URI: ${MONGO_URI}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6001:6001"
    networks:
      - ecommerce-network
    restart: unless-stopped

  api-gateway:
    image: api-gateway:local
    environment:
      APP_ENV: production
    ports:
      - "8080:8080"
    networks:
      - ecommerce-network
    restart: unless-stopped

networks:
  ecommerce-network:
    external: true
    name: ecommerce-network
