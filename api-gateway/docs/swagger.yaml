basePath: /api/v1
definitions:
  dto.CreateOrderItem:
    properties:
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
      unit_price:
        type: number
    type: object
  dto.CreateOrderRequest:
    properties:
      customer_id:
        type: string
      order_items:
        items:
          $ref: '#/definitions/dto.CreateOrderItem'
        type: array
    type: object
  dto.CreateProductRequest:
    properties:
      description:
        type: string
      name:
        type: string
      price:
        type: number
    required:
    - description
    - name
    type: object
  dto.ErrorResponse:
    properties:
      error:
        example: request failed
        type: string
    type: object
  dto.OrderItem:
    properties:
      id:
        type: string
      order_id:
        type: string
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
      subtotal:
        type: number
      unit_price:
        type: number
    type: object
  dto.OrderResponse:
    properties:
      customer_id:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/dto.OrderItem'
        type: array
      status:
        type: string
      total_amount:
        type: number
    type: object
  dto.ProductResponse:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
    type: object
info:
  contact: {}
  description: Public HTTP API for Go Commerce Microservices.
  title: Go Commerce API
  version: "1.0"
paths:
  /orders:
    post:
      consumes:
      - application/json
      description: Create an order and start the stock reservation workflow
      parameters:
      - description: Order data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create order
      tags:
      - Orders
  /orders/{id}:
    get:
      description: Return an order by its ID
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get order
      tags:
      - Orders
  /products:
    get:
      description: Return catalog products using the Redis/MongoDB read path
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProductResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List products
      tags:
      - Products
    post:
      consumes:
      - application/json
      description: Create a new catalog product
      parameters:
      - description: Product data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create product
      tags:
      - Products
  /products/search:
    get:
      description: Search product names and descriptions using Elasticsearch
      parameters:
      - description: Search text
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProductResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Search products
      tags:
      - Products
schemes:
- http
swagger: "2.0"
