<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Hexagonal Code Architecture</title>
  <desc id="desc">Colored diagram showing adapters around the application core, with ports, services, domain, database, and RabbitMQ.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#19324d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-slate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 13px Inter, Arial, sans-serif; fill: #475569; }
      .section { font: 700 13px Inter, Arial, sans-serif; fill: #334155; letter-spacing: 1.5px; }
      .box { filter: url(#shadow); stroke-width: 2; }
      .blue { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow-blue); }
      .purple { fill: none; stroke: #7c3aed; stroke-width: 3; marker-end: url(#arrow-purple); }
      .slate { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow-slate); }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#f8fbff"/>
  <text x="600" y="55" text-anchor="middle" class="title">Hexagonal Code Architecture</text>
  <text x="600" y="84" text-anchor="middle" class="subtitle">Adapters talk to the application core through ports; infrastructure stays outside the domain.</text>

  <rect x="70" y="125" width="1060" height="520" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>

  <rect x="390" y="190" width="420" height="330" rx="28" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="225" text-anchor="middle" class="section">APPLICATION CORE</text>

  <rect x="470" y="260" width="260" height="68" rx="16" fill="#ede9fe" stroke="#8b5cf6" class="box"/>
  <text x="600" y="288" text-anchor="middle" class="label">Application Service</text>
  <text x="600" y="312" text-anchor="middle" class="small">use-case orchestration</text>

  <rect x="470" y="365" width="260" height="68" rx="16" fill="#dcfce7" stroke="#22c55e" class="box"/>
  <text x="600" y="393" text-anchor="middle" class="label">Domain Model</text>
  <text x="600" y="417" text-anchor="middle" class="small">business rules</text>

  <rect x="470" y="540" width="260" height="64" rx="16" fill="#e0f2fe" stroke="#0ea5e9" class="box"/>
  <text x="600" y="568" text-anchor="middle" class="label">Port Interfaces</text>
  <text x="600" y="591" text-anchor="middle" class="small">contracts owned by core</text>

  <rect x="115" y="235" width="220" height="82" rx="18" fill="#dbeafe" stroke="#60a5fa" class="box"/>
  <text x="225" y="270" text-anchor="middle" class="label">gRPC Adapter</text>
  <text x="225" y="294" text-anchor="middle" class="small">external API</text>

  <rect x="115" y="390" width="220" height="82" rx="18" fill="#fff7ed" stroke="#f97316" class="box"/>
  <text x="225" y="425" text-anchor="middle" class="label">Messaging Adapter</text>
  <text x="225" y="449" text-anchor="middle" class="small">RabbitMQ consumer</text>

  <rect x="865" y="300" width="220" height="82" rx="18" fill="#fef3c7" stroke="#f59e0b" class="box"/>
  <text x="975" y="335" text-anchor="middle" class="label">Repository Adapter</text>
  <text x="975" y="359" text-anchor="middle" class="small">GORM / Mongo driver</text>

  <rect x="875" y="485" width="200" height="64" rx="16" fill="#f1f5f9" stroke="#94a3b8" class="box"/>
  <text x="975" y="513" text-anchor="middle" class="label">Database</text>
  <text x="975" y="536" text-anchor="middle" class="small">Postgres / MongoDB</text>

  <rect x="125" y="535" width="200" height="64" rx="16" fill="#fff7ed" stroke="#f97316" class="box"/>
  <text x="225" y="563" text-anchor="middle" class="label">RabbitMQ</text>
  <text x="225" y="586" text-anchor="middle" class="small">message broker</text>

  <path d="M335 276 L470 294" class="blue"/>
  <path d="M335 431 L470 294" class="blue"/>
  <path d="M600 328 L600 365" class="purple"/>
  <path d="M600 433 L600 540" class="purple"/>
  <path d="M730 572 L865 341" class="slate"/>
  <path d="M975 382 L975 485" class="slate"/>
  <path d="M225 472 L225 535" class="slate"/>
</svg>
