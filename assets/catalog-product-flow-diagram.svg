<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Catalog Product Flow</title>
  <desc id="desc">Colored sequence-style diagram for catalog write, outbox, RabbitMQ, catalog read projection, and product query.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#19324d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f97316"/>
    </marker>
    <style>
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 700 15px Inter, Arial, sans-serif; fill: #0f172a; }
      .step { font: 600 13px Inter, Arial, sans-serif; fill: #334155; }
      .lane { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 7 7; }
      .box { filter: url(#shadow); stroke-width: 2; }
      .blue { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow-blue); }
      .orange { fill: none; stroke: #f97316; stroke-width: 3; marker-end: url(#arrow-orange); }
    </style>
  </defs>

  <rect width="1400" height="760" fill="#f8fbff"/>
  <text x="700" y="52" text-anchor="middle" class="title">Catalog Product Flow</text>
  <text x="700" y="80" text-anchor="middle" class="subtitle">Create product on the write side, publish an event, project to MongoDB, then read from the query side.</text>

  <rect x="55" y="120" width="1290" height="575" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>

  <g>
    <rect x="95" y="145" width="150" height="58" rx="14" fill="#dbeafe" stroke="#60a5fa" class="box"/>
    <text x="170" y="181" text-anchor="middle" class="label">Client</text>
    <line x1="170" y1="215" x2="170" y2="655" class="lane"/>
  </g>
  <g>
    <rect x="285" y="145" width="165" height="58" rx="14" fill="#ede9fe" stroke="#8b5cf6" class="box"/>
    <text x="367" y="181" text-anchor="middle" class="label">API Gateway</text>
    <line x1="367" y1="215" x2="367" y2="655" class="lane"/>
  </g>
  <g>
    <rect x="500" y="145" width="180" height="58" rx="14" fill="#dcfce7" stroke="#22c55e" class="box"/>
    <text x="590" y="181" text-anchor="middle" class="label">Catalog Write</text>
    <line x1="590" y1="215" x2="590" y2="655" class="lane"/>
  </g>
  <g>
    <rect x="730" y="145" width="155" height="58" rx="14" fill="#ecfdf5" stroke="#10b981" class="box"/>
    <text x="807" y="181" text-anchor="middle" class="label">Postgres</text>
    <line x1="807" y1="215" x2="807" y2="655" class="lane"/>
  </g>
  <g>
    <rect x="930" y="145" width="155" height="58" rx="14" fill="#fff7ed" stroke="#f97316" class="box"/>
    <text x="1007" y="181" text-anchor="middle" class="label">RabbitMQ</text>
    <line x1="1007" y1="215" x2="1007" y2="655" class="lane"/>
  </g>
  <g>
    <rect x="1130" y="145" width="170" height="58" rx="14" fill="#e0f2fe" stroke="#0ea5e9" class="box"/>
    <text x="1215" y="181" text-anchor="middle" class="label">Catalog Read</text>
    <line x1="1215" y1="215" x2="1215" y2="655" class="lane"/>
  </g>

  <path d="M170 245 L367 245" class="blue"/>
  <text x="195" y="236" class="step">1. Create product</text>
  <path d="M367 285 L590 285" class="blue"/>
  <text x="395" y="276" class="step">2. gRPC CreateProduct</text>
  <path d="M590 325 L807 325" class="blue"/>
  <text x="620" y="316" class="step">3. Save product + outbox</text>
  <path d="M807 365 L590 365" class="blue"/>
  <text x="620" y="356" class="step">4. Product created</text>
  <path d="M590 405 L367 405" class="blue"/>
  <path d="M367 445 L170 445" class="blue"/>
  <text x="195" y="436" class="step">5. HTTP response</text>

  <path d="M590 505 L807 505" class="orange"/>
  <text x="615" y="496" class="step">6. Outbox worker reads event</text>
  <path d="M807 545 L1007 545" class="orange"/>
  <text x="835" y="536" class="step">7. Publish ProductCreated</text>
  <path d="M1007 585 L1215 585" class="orange"/>
  <text x="1030" y="576" class="step">8. Consume event</text>
  <path d="M1215 625 C1260 625, 1260 655, 1215 655" class="orange"/>
  <text x="1040" y="646" class="step">9. Upsert Mongo projection</text>
</svg>
