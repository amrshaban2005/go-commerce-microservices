<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="520" viewBox="0 0 1300 520" role="img" aria-labelledby="title desc">
  <title id="title">Order Stock Reservation Saga</title>
  <desc id="desc">Colored choreography saga diagram from create order to stock reservation success or failure.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#19324d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f97316"/>
    </marker>
    <style>
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 13px Inter, Arial, sans-serif; fill: #475569; }
      .tiny { font: 700 12px Inter, Arial, sans-serif; fill: #64748b; }
      .box { filter: url(#shadow); stroke-width: 2; }
      .event { fill: none; stroke: #f97316; stroke-width: 3; marker-end: url(#arrow); }
      .ok { fill: none; stroke: #16a34a; stroke-width: 3; marker-end: url(#arrow); }
      .fail { fill: none; stroke: #dc2626; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1300" height="520" fill="#f8fbff"/>
  <text x="650" y="52" text-anchor="middle" class="title">Saga Pattern: Order Stock Reservation</text>
  <text x="650" y="80" text-anchor="middle" class="subtitle">A choreography-based saga: each service commits locally and reacts to integration events.</text>

  <rect x="55" y="125" width="1190" height="320" rx="28" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>

  <rect x="95" y="230" width="165" height="76" rx="18" fill="#fef3c7" stroke="#f59e0b" class="box"/>
  <text x="177" y="262" text-anchor="middle" class="label">Create Order</text>
  <text x="177" y="286" text-anchor="middle" class="small">Order Service</text>

  <rect x="315" y="230" width="205" height="76" rx="18" fill="#fff7ed" stroke="#f97316" class="box"/>
  <text x="417" y="262" text-anchor="middle" class="label">ReserveStockRequested</text>
  <text x="417" y="286" text-anchor="middle" class="small">event</text>

  <rect x="575" y="230" width="180" height="76" rx="18" fill="#fee2e2" stroke="#ef4444" class="box"/>
  <text x="665" y="262" text-anchor="middle" class="label">Reserve Stock</text>
  <text x="665" y="286" text-anchor="middle" class="small">Inventory Service</text>

  <rect x="825" y="150" width="165" height="76" rx="18" fill="#dcfce7" stroke="#22c55e" class="box"/>
  <text x="907" y="182" text-anchor="middle" class="label">StockReserved</text>
  <text x="907" y="206" text-anchor="middle" class="small">event</text>

  <rect x="825" y="310" width="205" height="76" rx="18" fill="#fee2e2" stroke="#ef4444" class="box"/>
  <text x="927" y="342" text-anchor="middle" class="label">StockReservationFailed</text>
  <text x="927" y="366" text-anchor="middle" class="small">event</text>

  <rect x="1065" y="150" width="155" height="76" rx="18" fill="#dcfce7" stroke="#22c55e" class="box"/>
  <text x="1142" y="182" text-anchor="middle" class="label">Confirm Order</text>
  <text x="1142" y="206" text-anchor="middle" class="small">Order Service</text>

  <rect x="1065" y="310" width="155" height="76" rx="18" fill="#fee2e2" stroke="#ef4444" class="box"/>
  <text x="1142" y="342" text-anchor="middle" class="label">Reject Order</text>
  <text x="1142" y="366" text-anchor="middle" class="small">Order Service</text>

  <path d="M260 268 L315 268" class="event"/>
  <path d="M520 268 L575 268" class="event"/>
  <path d="M755 252 C795 230, 800 200, 825 188" class="ok"/>
  <path d="M755 284 C795 310, 800 338, 825 348" class="fail"/>
  <path d="M990 188 L1065 188" class="ok"/>
  <path d="M1030 348 L1065 348" class="fail"/>

  <text x="785" y="223" class="tiny" fill="#16a34a">success</text>
  <text x="785" y="323" class="tiny" fill="#dc2626">failure</text>
</svg>
