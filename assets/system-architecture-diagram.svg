<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="950" viewBox="0 0 1500 950" role="img" aria-labelledby="title desc">
  <title id="title">Go Commerce Microservices System Architecture</title>
  <desc id="desc">Architecture diagram with API Gateway, catalog services, order service, inventory service, Postgres, MongoDB, Redis, and RabbitMQ.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#19324d" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f97316"/>
    </marker>
    <marker id="arrow-slate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Inter, Arial, sans-serif; fill: #475569; }
      .section { font: 700 13px Inter, Arial, sans-serif; fill: #334155; letter-spacing: 1.6px; }
      .label { font: 700 18px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 13px Inter, Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Inter, Arial, sans-serif; fill: #64748b; }
      .box { stroke-width: 2; filter: url(#shadow); }
      .lane { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; }
      .grpc { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow-blue); }
      .event { fill: none; stroke: #f97316; stroke-width: 3; marker-end: url(#arrow-orange); }
      .data { fill: none; stroke: #64748b; stroke-width: 2.6; stroke-dasharray: 8 7; marker-end: url(#arrow-slate); }
      .cache { fill: none; stroke: #dc2626; stroke-width: 3; stroke-dasharray: 6 6; marker-end: url(#arrow-red); }
    </style>
  </defs>

  <rect width="1500" height="950" fill="#f8fbff"/>
  <text x="750" y="58" text-anchor="middle" class="title">Go Commerce Microservices</text>
  <text x="750" y="88" text-anchor="middle" class="subtitle">gRPC services, RabbitMQ events, Postgres write models, MongoDB read projection, and Redis cache</text>

  <rect x="55" y="125" width="1390" height="760" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>

  <rect x="90" y="165" width="1320" height="165" rx="22" class="lane"/>
  <text x="118" y="198" class="section">SYNCHRONOUS REQUEST PATH</text>

  <rect x="90" y="365" width="1320" height="280" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="118" y="398" class="section">SERVICES AND DATA STORES</text>

  <rect x="90" y="680" width="1320" height="155" rx="22" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="118" y="712" class="section">ASYNCHRONOUS EVENT PATH</text>

  <!-- Request path -->
  <rect x="125" y="225" width="175" height="76" rx="18" fill="#dbeafe" stroke="#60a5fa" class="box"/>
  <text x="212" y="257" text-anchor="middle" class="label">Client</text>
  <text x="212" y="281" text-anchor="middle" class="small">HTTP caller</text>

  <rect x="380" y="210" width="220" height="106" rx="20" fill="#ede9fe" stroke="#8b5cf6" class="box"/>
  <text x="490" y="250" text-anchor="middle" class="label">API Gateway</text>
  <text x="490" y="276" text-anchor="middle" class="small">Gin HTTP API</text>
  <text x="490" y="297" text-anchor="middle" class="tiny">HTTP to gRPC</text>

  <rect x="700" y="155" width="205" height="82" rx="18" fill="#dcfce7" stroke="#22c55e" class="box"/>
  <text x="802" y="188" text-anchor="middle" class="label">Catalog Write</text>
  <text x="802" y="211" text-anchor="middle" class="small">gRPC command API</text>

  <rect x="700" y="260" width="205" height="82" rx="18" fill="#e0f2fe" stroke="#0ea5e9" class="box"/>
  <text x="802" y="293" text-anchor="middle" class="label">Catalog Read</text>
  <text x="802" y="316" text-anchor="middle" class="small">gRPC query API</text>

  <rect x="1005" y="210" width="210" height="106" rx="20" fill="#fef3c7" stroke="#f59e0b" class="box"/>
  <text x="1110" y="250" text-anchor="middle" class="label">Order Service</text>
  <text x="1110" y="276" text-anchor="middle" class="small">gRPC order API</text>
  <text x="1110" y="297" text-anchor="middle" class="tiny">starts saga</text>

  <!-- Services -->
  <rect x="205" y="440" width="225" height="88" rx="18" fill="#dcfce7" stroke="#22c55e" class="box"/>
  <text x="317" y="476" text-anchor="middle" class="label">Catalog Write</text>
  <text x="317" y="501" text-anchor="middle" class="small">products write side</text>

  <rect x="500" y="440" width="225" height="88" rx="18" fill="#e0f2fe" stroke="#0ea5e9" class="box"/>
  <text x="612" y="476" text-anchor="middle" class="label">Catalog Read</text>
  <text x="612" y="501" text-anchor="middle" class="small">read projection + cache</text>

  <rect x="795" y="440" width="225" height="88" rx="18" fill="#fef3c7" stroke="#f59e0b" class="box"/>
  <text x="907" y="476" text-anchor="middle" class="label">Order Service</text>
  <text x="907" y="501" text-anchor="middle" class="small">orders + outbox</text>

  <rect x="1090" y="440" width="225" height="88" rx="18" fill="#fee2e2" stroke="#ef4444" class="box"/>
  <text x="1202" y="476" text-anchor="middle" class="label">Inventory Service</text>
  <text x="1202" y="501" text-anchor="middle" class="small">stock reservation</text>

  <!-- Data store icons -->
  <g transform="translate(232 552)">
    <ellipse cx="85" cy="14" rx="85" ry="14" fill="#e0f2fe" stroke="#2563eb" stroke-width="2"/>
    <rect x="0" y="14" width="170" height="58" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <ellipse cx="85" cy="72" rx="85" ry="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="85" y="48" text-anchor="middle" class="small">Postgres</text>
    <text x="85" y="102" text-anchor="middle" class="tiny">catalog_write_db</text>
  </g>

  <g transform="translate(505 552)">
    <ellipse cx="60" cy="18" rx="60" ry="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <rect x="0" y="18" width="120" height="58" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
    <ellipse cx="60" cy="76" rx="60" ry="18" fill="#86efac" stroke="#22c55e" stroke-width="2"/>
    <text x="60" y="51" text-anchor="middle" class="small">MongoDB</text>
    <text x="60" y="107" text-anchor="middle" class="tiny">read model</text>
  </g>

  <g transform="translate(648 553)">
    <polygon points="18,28 88,0 158,28 88,56" fill="#ef4444" stroke="#991b1b" stroke-width="2"/>
    <polygon points="18,50 88,22 158,50 88,78" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
    <polygon points="18,72 88,44 158,72 88,100" fill="#b91c1c" stroke="#991b1b" stroke-width="2"/>
    <rect x="70" y="25" width="18" height="18" fill="#ffffff" opacity="0.9"/>
    <circle cx="108" cy="46" r="9" fill="#ffffff" opacity="0.9"/>
    <text x="88" y="122" text-anchor="middle" class="tiny">Redis cache</text>
  </g>

  <g transform="translate(835 552)">
    <ellipse cx="72" cy="14" rx="72" ry="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="14" width="144" height="58" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <ellipse cx="72" cy="72" rx="72" ry="14" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
    <text x="72" y="48" text-anchor="middle" class="small">Postgres</text>
    <text x="72" y="102" text-anchor="middle" class="tiny">order_db</text>
  </g>

  <g transform="translate(1130 552)">
    <ellipse cx="72" cy="14" rx="72" ry="14" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <rect x="0" y="14" width="144" height="58" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <ellipse cx="72" cy="72" rx="72" ry="14" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
    <text x="72" y="48" text-anchor="middle" class="small">Postgres</text>
    <text x="72" y="102" text-anchor="middle" class="tiny">inventory_db</text>
  </g>

  <!-- RabbitMQ icon -->
  <g transform="translate(560 720)">
    <rect x="0" y="0" width="380" height="76" rx="22" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
    <rect x="38" y="20" width="42" height="42" rx="8" fill="#f97316"/>
    <path d="M50 30 L50 52 L68 52 L68 41 L60 41 L60 30 Z" fill="#ffffff"/>
    <text x="215" y="31" text-anchor="middle" class="label">RabbitMQ Broker</text>
    <text x="215" y="56" text-anchor="middle" class="small">integration events</text>
  </g>

  <!-- Request arrows -->
  <path d="M300 263 L380 263" class="grpc"/>
  <path d="M600 238 C645 198, 665 198, 700 198" class="grpc"/>
  <path d="M600 278 C645 302, 665 302, 700 302" class="grpc"/>
  <path d="M600 263 L1005 263" class="grpc"/>

  <!-- Data arrows -->
  <path d="M317 528 L317 552" class="data"/>
  <path d="M587 528 L565 552" class="data"/>
  <path d="M637 528 L725 553" class="cache"/>
  <path d="M907 528 L907 552" class="data"/>
  <path d="M1202 528 L1202 552" class="data"/>

  <!-- Event arrows -->
  <path d="M317 528 C340 680, 480 735, 560 746" class="event"/>
  <path d="M907 528 C890 660, 820 700, 760 720" class="event"/>
  <path d="M1202 528 C1180 675, 1030 730, 940 746" class="event"/>
  <path d="M680 720 C620 665, 612 585, 612 528" class="event"/>
  <path d="M830 720 C950 670, 1125 585, 1202 528" class="event"/>
  <path d="M865 720 C920 650, 918 580, 907 528" class="event"/>

  <text x="620" y="185" class="tiny" fill="#2563eb">gRPC</text>
  <text x="1280" y="542" class="tiny" fill="#64748b">local transactions</text>
  <text x="740" y="676" class="tiny" fill="#f97316">events</text>
  <text x="742" y="538" class="tiny" fill="#dc2626">cache</text>

  <rect x="120" y="724" width="335" height="72" rx="18" fill="#ffffff" stroke="#fed7aa"/>
  <text x="145" y="754" class="small">Event examples:</text>
  <text x="145" y="778" class="tiny">ProductCreated, ReserveStockRequested, StockReserved</text>

  <rect x="1045" y="724" width="330" height="72" rx="18" fill="#ffffff" stroke="#fed7aa"/>
  <text x="1070" y="754" class="small">Patterns:</text>
  <text x="1070" y="778" class="tiny">Saga, Outbox, Inbox, CQRS, Redis cache</text>
</svg>
